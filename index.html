// ─── LIVE FORECAST via Open-Meteo ─────────────────────────────────────────────
async function fetchForecasts(mountains) {
  const results = {};
  // Batch into groups of 10 to avoid overwhelming requests
  const batches = [];
  for (let i = 0; i < mountains.length; i += 10) {
    batches.push(mountains.slice(i, i + 10));
  }
  for (const batch of batches) {
    await Promise.all(batch.map(async (m) => {
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${m.lat}&longitude=${m.lon}&daily=snowfall_sum,weathercode&forecast_days=5&timezone=America%2FDenver`;
        const res = await fetch(url);
        const data = await res.json();
        const days = ['Mon','Tue','Wed','Thu','Fri'];
        const today = new Date().getDay();
        const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const forecast = data.daily.time.map((date, i) => {
          const d = new Date(date);
          const wc = data.daily.weathercode[i];
          const snow = Math.round((data.daily.snowfall_sum[i] || 0) * 3.937); // cm to inches
          let icon = "☀️";
          if (wc >= 71 && wc <= 77) icon = "🌨";
          else if (wc >= 61 && wc <= 67) icon = "🌧";
          else if (wc >= 51 && wc <= 57) icon = "🌦";
          else if (wc >= 1 && wc <= 3) icon = "⛅";
          else if (wc >= 45 && wc <= 48) icon = "🌫";
          return { day: dayNames[d.getDay()], icon, snow };
        });
        // Estimate current base from snowScore (mock — real would need SNOTEL)
        results[m.id] = { forecast, currentBase: m.snowScore };
      } catch(e) {
        results[m.id] = null;
      }
    }));
  }
  return results;
}

// ─── FLIGHT LINK HELPER ───────────────────────────────────────────────────────
const ORIGIN_AIRPORT = { denver:"DEN", slc:"SLC", seattle:"SEA", portland:"PDX", sf:"SFO", la:"LAX", bzn:"BZN" };

function getFlightLink(mountain, origin) {
  const dest = mountain.nearestAirport?.code;
  const orig = ORIGIN_AIRPORT[origin] || "DEN";
  if (!dest) return null;
  return `https://www.google.com/travel/flights/search?tfs=CBwQAhoeEgoyMDI1LTEyLTEwagcIARIDDEN` +
    `&q=Flights+from+${orig}+to+${dest}` +
    `#flt=${orig}.${dest}`;
}

// ─── SCORING ENGINE ───────────────────────────────────────────────────────────
function getDistance(m, origin) {
  const map = { denver: m.distanceDenver, slc: m.distanceSLC, seattle: m.distanceSeattle, sf: m.distanceSF, la: m.distanceLA, portland: m.distancePortland, bzn: m.distanceBZN || 999 };
  return map[origin] || m.distanceDenver;
}

function calcTripCost(m, nights, groupSize, origin) {
  const lodging = m.avgLodgingPerNight * nights;
  const tickets = m.liftTicket * nights * groupSize;
  const dist = getDistance(m, origin);
  const travel = (m.travelMode === "drive" || (m.travelMode === "either" && dist < 200)) ? Math.round(dist * 0.18 * 2) : groupSize * 280;
  return lodging + tickets + travel;
}

function scoreResult(m, params, liveData) {
  const { budget, nights, groupSize, origin, style, skill, travel } = params;
  const cost = calcTripCost(m, nights, groupSize, origin);
  const budgetFit = cost <= budget ? 1 : cost <= budget * 1.2 ? 0.6 : 0.1;
  const dist = getDistance(m, origin);
  if (travel === "drive" && dist > 300) return -1;
  if (travel === "fly" && dist < 80) return -1;

  // Boost snow score if live data shows fresh snow incoming
  let liveSnowBoost = 0;
  if (liveData && liveData[m.id]) {
    const totalForecast = liveData[m.id].forecast.reduce((s,d) => s + d.snow, 0);
    if (totalForecast > 20) liveSnowBoost = 8;
    else if (totalForecast > 10) liveSnowBoost = 4;
  }

  const snow = (m.snowScore + liveSnowBoost) * 0.35;
  const value = m.valueScore * budgetFit * 0.25;
  const crowd = (100 - m.crowdScore) * 0.18;
  const access = m.accessScore * 0.1;
  const styleBonus = m.tags.includes(style) ? 9 : 0;
  const skillBonus = m.tags.includes(skill) ? 5 : 0;
  return Math.round(snow + value + crowd + access + styleBonus + skillBonus);
}

// ─── AI RECOMMENDATION ────────────────────────────────────────────────────────
async function getAIRecommendation(topMountain, params, allResults, liveData) {
  const top3Names = allResults.slice(0, 3).map(m => m.name).join(", ");
  const live = liveData && liveData[topMountain.id];
  const totalSnow = live ? live.forecast.reduce((s,d) => s + d.snow, 0) : "unknown";
  const cost = calcTripCost(topMountain, params.nights, params.groupSize, params.origin);
  const originLabels = { denver:"Denver", slc:"Salt Lake City", seattle:"Seattle", sf:"San Francisco", la:"Los Angeles", portland:"Portland" };

  const prompt = `You are a ski-obsessed local who's skied every resort in the western US. Straight talk only — no fluff, no corporate language, no "I'd be happy to" or "it's worth noting."

Trip details:
- Budget: $${params.budget} for ${params.groupSize} person(s), ${params.nights} nights
- Travel: ${params.travel} from ${originLabels[params.origin] || params.origin}
- Style: ${params.style} skiing, ${params.skill} level

Top pick: ${topMountain.name}, ${topMountain.state}
- Estimated trip cost: $${cost.toLocaleString()}
- Forecast snowfall next 5 days: ${totalSnow} inches
- Crowd score: ${topMountain.crowdScore}/100 (lower = emptier)
- ${topMountain.description}

Other options: ${top3Names}

3 sentences MAX. Sound like a ski buddy texting, not a travel agent. Real numbers. End with one blunt honest tip. Under 75 words. No bullets.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: prompt }] }),
  });
  const data = await response.json();
  return data.content?.[0]?.text || "";
}

// ─── COMPONENTS ───────────────────────────────────────────────────────────────
function ScoreBar({ label, value, color }) {
  return (
    <div style={{display:"flex",flexDirection:"column",gap:3}}>
      <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#8a8480"}}>{label}</div>
      <div style={{width:56,height:4,background:"#e8e4de",borderRadius:99,overflow:"hidden"}}>
        <div style={{width:`${Math.min(value,100)}%`,height:"100%",background:color,borderRadius:99,transition:"width 0.8s ease"}}/>
      </div>
    </div>
  );
}

function ForecastDay({ day, icon, snow }) {
  return (
    <div style={{flex:1,background:"#f5f3ef",borderRadius:8,padding:"8px 4px",textAlign:"center"}}>
      <div style={{fontSize:"0.65rem",color:"#8a8480",marginBottom:2}}>{day}</div>
      <div style={{fontSize:"1.1rem",marginBottom:2}}>{icon}</div>
      <div style={{fontWeight:700,fontSize:"0.8rem",color:snow>0?"#1a6b7c":"#c0bbb4"}}>{snow>0?`${snow}"`:"—"}</div>
    </div>
  );
}

function ResultCard({ mountain, rank, params, isExpanded, onToggle, liveData }) {
  const cost = calcTripCost(mountain, params.nights, params.groupSize, params.origin);
  const withinBudget = cost <= params.budget * 1.15;
  const live = liveData && liveData[mountain.id];
  const forecast = live ? live.forecast : mountain.weeklyForecast || [];
  const totalSnow = forecast.reduce((s,d)=>s+d.snow,0);
  const rankBg = rank===1?"#0d0f0f":rank===2?"#6b6560":rank===3?"#c0bbb4":"#e8e4de";
  const rankColor = rank<=2?"#fff":"#8a8480";

  return (
    <div onClick={onToggle} style={{background:"#fff",border:`1.5px solid ${rank===1?"#1a6b7c":"#e8e4de"}`,borderRadius:14,padding:"1.4rem",marginBottom:"0.75rem",cursor:"pointer",transition:"box-shadow 0.2s",boxShadow:isExpanded?"0 8px 40px rgba(13,15,15,0.1)":"0 2px 8px rgba(13,15,15,0.04)"}}>
      <div style={{display:"grid",gridTemplateColumns:"40px 1fr auto",gap:"1rem",alignItems:"flex-start"}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:rankBg,color:rankColor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.85rem",fontWeight:700,flexShrink:0}}>{rank}</div>
        <div>
          {rank===1&&<div style={{display:"inline-block",fontSize:"0.62rem",fontWeight:800,letterSpacing:"0.12em",textTransform:"uppercase",background:"#0d0f0f",color:"#fff",borderRadius:99,padding:"3px 10px",marginBottom:6}}>Top Pick</div>}
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.15rem",marginBottom:2}}>{mountain.name}, {mountain.state}</div>
          <div style={{fontSize:"0.72rem",color:"#8a8480",fontStyle:"italic",marginBottom:8}}>"{mountain.nickname}"</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"10px",fontSize:"0.78rem",color:"#6b6560",marginBottom:10}}>
            <span>⛰ {mountain.verticalDrop.toLocaleString()} ft</span>
            <span>🎿 {mountain.skiableAcres.toLocaleString()} acres</span>
            <span>🎟 ${mountain.liftTicket}/day</span>
            <span>🌨 {totalSnow}" {live ? "live forecast" : "forecast"}</span>
          </div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <ScoreBar label="Snow" value={mountain.snowScore} color="#2a8fa5"/>
            <ScoreBar label="Value" value={mountain.valueScore} color="#1e7a4a"/>
            <ScoreBar label="Quiet" value={100-mountain.crowdScore} color="#b8860b"/>
            <ScoreBar label="Access" value={mountain.accessScore} color="#7c5cbf"/>
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:"0.6rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"#a09b92",marginBottom:4}}>SummitScore</div>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:"2.2rem",lineHeight:1,color:"#0d0f0f"}}>{mountain.score}</div>
          <div style={{fontSize:"0.8rem",fontWeight:600,color:withinBudget?"#1e7a4a":"#c0392b",marginTop:6}}>${cost.toLocaleString()} est.</div>
          <div style={{fontSize:"0.68rem",color:"#a09b92",marginTop:2}}>{withinBudget?"✓ in budget":"⚠ over budget"}</div>
        </div>
      </div>

      {isExpanded && (
        <div style={{marginTop:"1.25rem",paddingTop:"1.25rem",borderTop:"1px solid #e8e4de",animation:"fadeUp 0.25s ease"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0.875rem"}}>
            <div style={{background:"#f8f7f4",borderRadius:10,padding:"1rem"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:"0.68rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"#8a8480"}}>5-Day Forecast</div>
                {live && <div style={{fontSize:"0.6rem",fontWeight:700,color:"#1a6b7c",background:"#eef6f9",borderRadius:99,padding:"2px 7px"}}>LIVE</div>}
              </div>
              <div style={{display:"flex",gap:4,marginBottom:12}}>
                {forecast.map((d,i)=><ForecastDay key={i} {...d}/>)}
              </div>
              <a href={mountain.openSnowLink} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
                style={{display:"flex",alignItems:"center",gap:6,textDecoration:"none",background:"#1a6b7c",color:"#fff",borderRadius:7,padding:"8px 12px",fontSize:"0.75rem",fontWeight:700}}>
                <span>❄️</span> Full Forecast on OpenSnow
              </a>
            </div>
            <div style={{background:"#f8f7f4",borderRadius:10,padding:"1rem"}}>
              <div style={{fontSize:"0.68rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"#8a8480",marginBottom:8}}>Trip Cost</div>
              <div style={{fontSize:"0.82rem",color:"#4a4540",lineHeight:1.8,marginBottom:10}}>
                <div>Lift tickets: <strong>${(mountain.liftTicket*params.nights*params.groupSize).toLocaleString()}</strong></div>
                <div style={{paddingTop:4,borderTop:"1px solid #e8e4de",marginTop:4,fontSize:"0.75rem",color:"#8a8480"}}>
                  + lodging below · <strong style={{color:withinBudget?"#1e7a4a":"#c0392b"}}>{withinBudget?"within budget":"over budget"}</strong>
                </div>
              </div>
              <div style={{fontSize:"0.68rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"#8a8480",marginBottom:8}}>Where to Stay</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {mountain.lodgingTiers.map(t=>(
                  <a key={t.tier} href={t.link} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
                    style={{display:"block",textDecoration:"none",background:"#fff",border:"1px solid #e8e4de",borderRadius:8,padding:"8px 10px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                      <span style={{fontSize:"0.72rem",fontWeight:700,color:"#0d0f0f"}}>{t.label}</span>
                      <span style={{fontSize:"0.78rem",fontWeight:700,color:"#1a6b7c"}}>{t.pricePerNight===0?"Free":`$${t.pricePerNight}/night`}</span>
                    </div>
                    <div style={{fontSize:"0.72rem",fontWeight:600,color:"#4a4540"}}>{t.name}</div>
                    <div style={{fontSize:"0.68rem",color:"#8a8480",marginTop:1}}>{t.note}</div>
                  </a>
                ))}
              </div>
            </div>
            <div style={{background:"#f8f7f4",borderRadius:10,padding:"1rem"}}>
              <div style={{fontSize:"0.68rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"#8a8480",marginBottom:10}}>Local Intel</div>
              <div style={{fontSize:"0.8rem",color:"#4a4540",lineHeight:1.7}}>
                <div><strong>↑</strong> {mountain.pros}</div>
                <div style={{marginTop:6}}><strong>↓</strong> {mountain.cons}</div>
              </div>
              <a href={mountain.resortLink} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
                style={{display:"inline-flex",alignItems:"center",gap:6,textDecoration:"none",background:"#f0ede8",color:"#0d0f0f",borderRadius:7,padding:"7px 12px",fontSize:"0.72rem",fontWeight:700,marginTop:12}}>
                🏔 Official Snow Report
              </a>
              {mountain.flyInOptions && mountain.flyInOptions.length > 0 && (
                <div style={{marginTop:12}}>
                  <div style={{fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"#8a8480",marginBottom:6}}>Fly-In Options</div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {mountain.flyInOptions.map((apt,i) => {
                      const orig = ORIGIN_AIRPORT[params.origin] || "DEN";
                      const flightUrl = `https://www.google.com/travel/flights#flt=${orig}.${apt.code}.;c:USD;e:1;sd:1;t:f`;
                      const majorCodes = ["DEN","SLC","SEA","PDX","SFO","LAX","SMF","BZN","RNO","FCA","GEG","MSP"];
                      const isMajor = majorCodes.includes(apt.code);
                      return (
                        <a key={apt.code} href={flightUrl} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
                          style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",textDecoration:"none",background:i===0?"#0d0f0f":isMajor?"#f0ede8":"#fef9e7",color:i===0?"#fff":"#0d0f0f",borderRadius:7,padding:"8px 10px",border:`1px solid ${i===0?"transparent":isMajor?"#e8e4de":"#f0d080"}`}}>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                              <span style={{fontSize:"0.75rem",fontWeight:700}}>✈️ {apt.code} · {apt.name}</span>
                              {i===0 && <span style={{fontSize:"0.58rem",fontWeight:800,letterSpacing:"0.08em",textTransform:"uppercase",background:"#2a8fa5",color:"#fff",borderRadius:99,padding:"1px 6px"}}>Best Value</span>}
                              {!isMajor && i!==0 && <span style={{fontSize:"0.58rem",fontWeight:800,letterSpacing:"0.08em",textTransform:"uppercase",background:"#b8860b",color:"#fff",borderRadius:99,padding:"1px 6px"}}>Regional</span>}
                            </div>
                            <div style={{fontSize:"0.65rem",opacity:i===0?0.75:0.65,lineHeight:1.4}}>{apt.note}</div>
                          </div>
                          <div style={{fontSize:"0.7rem",fontWeight:700,opacity:0.8,whiteSpace:"nowrap",marginLeft:10,paddingTop:2}}>🚗 {apt.drive}</div>
                        </a>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [params, setParams] = useState({budget:2000,nights:4,groupSize:2,origin:"denver",travel:"either",style:"all-mountain",skill:"intermediate"});
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [forecastLoading, setForecastLoading] = useState(false);
  const [aiRec, setAiRec] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [expandedId, setExpandedId] = useState(null);
  const [hasSearched, setHasSearched] = useState(false);
  const [showCount, setShowCount] = useState(8);
  const [liveData, setLiveData] = useState({});
  const [showAbout, setShowAbout] = useState(false);
  const resultsRef = useRef(null);
  const set = (k,v) => setParams(p=>({...p,[k]:v}));

  async function runSearch() {
    setLoading(true); setForecastLoading(true); setHasSearched(false);
    setAiRec(""); setExpandedId(null); setShowCount(8);

    // Fetch live forecasts in parallel with scoring delay
    const [, forecasts] = await Promise.all([
      new Promise(r=>setTimeout(r,900)),
      fetchForecasts(MOUNTAINS)
    ]);

    setLiveData(forecasts);
    setForecastLoading(false);

    const scored = MOUNTAINS
      .map(m=>({...m, score:scoreResult(m,params,forecasts), estimatedCost:calcTripCost(m,params.nights,params.groupSize,params.origin)}))
      .filter(m=>m.score>0)
      .sort((a,b)=>b.score-a.score);

    setResults(scored); setLoading(false); setHasSearched(true);
    setTimeout(()=>resultsRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),100);

    if (scored.length>0) {
      setAiLoading(true);
      try { setAiRec(await getAIRecommendation(scored[0],params,scored,forecasts)); }
      catch(e) { setAiRec("Couldn't load recommendation — try again."); }
      setAiLoading(false);
    }
  }

  const inp = {height:44,border:"1.5px solid #e8e4de",borderRadius:8,padding:"0 12px",fontFamily:"'DM Sans',sans-serif",fontSize:"0.9rem",color:"#0d0f0f",background:"#f5f3ef",outline:"none",width:"100%"};
  const lbl = {fontSize:"0.68rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"#8a8480",marginBottom:5,display:"block"};

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"#f8f7f4",minHeight:"100vh",color:"#0d0f0f"}}>
      {showAbout && <WhySummitSyncModal onClose={()=>setShowAbout(false)}/>}

      {/* NAV */}
      <nav style={{position:"sticky",top:0,zIndex:100,background:"rgba(248,247,244,0.92)",backdropFilter:"blur(14px)",borderBottom:"1px solid #e8e4de",padding:"0 2rem",height:58,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,background:"#0d0f0f",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontFamily:"'DM Serif Display',serif",fontSize:"1rem"}}>S</div>
          <span style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.2rem"}}>SummitSync</span>
        </div>
        <button onClick={()=>setShowAbout(true)} style={{background:"none",border:"1.5px solid #e8e4de",borderRadius:8,padding:"7px 16px",fontFamily:"'DM Sans',sans-serif",fontSize:"0.82rem",fontWeight:600,color:"#4a4540",cursor:"pointer",transition:"all 0.15s"}}>
          Why SummitSync
        </button>
      </nav>

      {/* HERO */}
      <div style={{maxWidth:760,margin:"0 auto",padding:"4.5rem 2rem 2.5rem",textAlign:"center"}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:7,fontSize:"0.68rem",fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",color:"#1a6b7c",background:"#eef6f9",border:"1px solid #c5dfe8",borderRadius:99,padding:"5px 14px",marginBottom:"1.5rem"}}>
          <span style={{width:6,height:6,background:"#2a8fa5",borderRadius:"50%",animation:"pulse 2s infinite",display:"inline-block"}}/>
          {MOUNTAINS.length} Resorts · Live Forecasts · AI-Powered

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"1.25rem"}}>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.5rem"}}>{results.length} Matches</div>
            <div style={{fontSize:"0.75rem",color:"#a09b92"}}>Live forecast data · click any card to expand</div>
          </div>

          {results.slice(0,showCount).map((m,i)=>(
            <ResultCard key={m.id} mountain={m} rank={i+1} params={params}
              isExpanded={expandedId===m.id} onToggle={()=>setExpandedId(expandedId===m.id?null:m.id)}
              liveData={liveData}/>
          ))}

          {results.length > showCount && (
            <button onClick={()=>setShowCount(c=>c+8)}
              style={{width:"100%",padding:"14px",background:"#fff",border:"1.5px solid #e8e4de",borderRadius:10,fontFamily:"'DM Sans',sans-serif",fontSize:"0.88rem",fontWeight:600,color:"#6b6560",cursor:"pointer",marginBottom:"1rem"}}>
              Show more ({results.length - showCount} remaining)
            </button>
          )}

          {/* Weather Snapshot */}
          <div style={{marginTop:"2.5rem",marginBottom:"4rem"}}>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.5rem",marginBottom:"1.25rem"}}>Weather Snapshot — Top 3</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0.875rem"}}>
              {results.slice(0,3).map(m=>{
                const live = liveData && liveData[m.id];
                const forecast = live ? live.forecast : (m.weeklyForecast || []);
                const total = forecast.reduce((s,d)=>s+d.snow,0);
                const trend = total>20?{label:"↑ Active storm",bg:"#e8f5ee",color:"#1e7a4a"}:total>6?{label:"→ Mixed outlook",bg:"#fef9e7",color:"#b8860b"}:{label:"↓ Dry stretch",bg:"#fdecea",color:"#c0392b"};
                return (
                  <div key={m.id} style={{background:"#fff",border:"1px solid #e8e4de",borderRadius:12,padding:"1.25rem"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                      <div style={{fontSize:"0.68rem",fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#8a8480"}}>{m.name}</div>
                      {live && <div style={{fontSize:"0.6rem",fontWeight:700,color:"#1a6b7c",background:"#eef6f9",borderRadius:99,padding:"2px 7px"}}>LIVE</div>}
                    </div>
                    <div style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.8rem",lineHeight:1}}>{total}"</div>
                    <div style={{fontSize:"0.75rem",color:"#a09b92",marginTop:2,marginBottom:8}}>5-day forecast</div>
                    <div style={{display:"inline-flex",gap:4,fontSize:"0.72rem",fontWeight:700,background:trend.bg,color:trend.color,borderRadius:99,padding:"3px 10px"}}>{trend.label}</div>
                    <div style={{fontSize:"0.75rem",color:"#6b6560",marginTop:8}}>{m.averageSnowfall}" season avg</div>
                    <a href={m.openSnowLink} target="_blank" rel="noopener noreferrer"
                      style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:10,fontSize:"0.7rem",fontWeight:700,color:"#1a6b7c",textDecoration:"none"}}>
                      ❄️ OpenSnow Forecast →
                    </a>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {!hasSearched&&!loading&&(
        <div style={{textAlign:"center",padding:"5rem 2rem",color:"#a09b92",fontSize:"0.9rem"}}>
          Set your trip details above and hit Search
        </div>
      )}

      <footer style={{borderTop:"1px solid #e8e4de",padding:"1.5rem 2rem",textAlign:"center",fontSize:"0.72rem",color:"#a09b92"}}>
        © 2025 SummitSync · {MOUNTAINS.length} resorts · Live forecasts via Open-Meteo · AI by Claude · Forecast links via OpenSnow
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
