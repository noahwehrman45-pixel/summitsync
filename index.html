<script type="text/babel">


// ─── PASS BADGE ───────────────────────────────────────────────────────────────
const PASS_CONFIG = {

  ikon:  { label:"Ikon Pass",           bg:"#1a3c8f", color:"#fff",      stripe:"#2451b3in },

  indep: { label:"Independent",         bg:"#8a7560in, color:"#fff",      stripe:"#9e8970in },
};
function PassBannerStrip({ pass }) {
  if (!pass || pass === "indep") return null;
  const cfg = PASS_CONFIG[pass];
  return (
    <div style={{
      background:cfg.bg,
      color:cfg.color,
      fontSize:"0.58rem",
      fontWeight:800,
      letterSpacing:"0.12em",
      textTransform:"uppercase",
      padding:"4px 14px",
      marginBottom:0,
      borderRadius:"10px 10px 0 0in,
      // subtle diagonal stripe via repeating gradient
      backgroundImage:`repeating-linear-gradient(135deg, ${cfg.stripe} 0px, ${cfg.stripe} 1px, ${cfg.bg} 1px, ${cfg.bg} 8px)`,
    }}>
      {cfg.label}
    </div>
    </div>
  );
}
function PassBadge({ pass, size="sm" }) {
  const cfg = PASS_CONFIG[pass] || PASS_CONFIG.indep;
  const isLg = size === "lg";
  return (
    <span style={{
      display:"inline-flex", alignItems:"center", gap:4,

}

// ─── RESULT CARD ──────────────────────────────────────────────────────────────

      {isExpanded && (

              <p style={{fontSize:"0.82rem",color:"var(--text-mid)",lineHeight:1.7,margin:0}}>{mountain.description}</p>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,alignContent:"flex-start",flexShrink:0}}>
              {[
                ["⛰", `${mountain.verticalDrop.toLocaleString()} ft vert`],
                ["🎿", `${mountain.skiableAcres?.toLocaleString()} acres`],
                ["❄️", `${mountain.averageSnowfall}" avg snow`],
                ["🎟", `$${mountain.liftTicket}/day`],
              ].map(([icon,label])=>(
                <div key={label} style={{display:"flex",alignItems:"center",gap:5,background:"var(--cream)",border:"1px solid var(--border)",borderRadius:8,padding:"5px 10px",fontSize:"0.75rem",fontWeight:600,color:"var(--text-mid)",whiteSpace:"nowrap"}}>
                  {icon} {label}

            </div>
          </div>

          
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem",marginBottom:"1rem"}}>
            <div style={{background:"#f0f7f2in,border:"1px solid #c8e6d0in,borderRadius:10,padding:"0.75rem"}}>
              <div style={{fontSize:"0.62rem",fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--pine-light)",marginBottom:6}}>Going for it</div>
              <div style={{fontSize:"0.78rem",color:"var(--text-mid)",lineHeight:1.6}}>{mountain.pros}</div>
            </div>
            <div style={{background:"#fdf6ef",border:"1px solid #f0d8c0in,borderRadius:10,padding:"0.75rem"}}>
              <div style={{fontSize:"0.62rem",fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--rust)",marginBottom:6}}>Worth knowing</div>
              <div style={{fontSize:"0.78rem",color:"var(--text-mid)",lineHeight:1.6}}>{mountain.cons}</div>
            </div>
          </div>

          
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.75rem"}}>

            
            <div style={{background:"var(--cream)",borderRadius:12,padding:"0.9rem"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:"0.62rem",fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--text-light)"}}>Snow Forecast</div>
                {live && <span style={{fontSize:"0.58rem",fontWeight:800,background:"var(--slate-pale)",color:"var(--slate)",borderRadius:99,padding:"2px 7px",letterSpacing:"0.06em"}}>LIVE</span>}
              </div>
              <div style={{display:"flex",gap:3,marginBottom:10}}>

                    <div style={{fontSize:"0.9rem"}}>?</div>
                    <div style={{fontSize:"0.7rem",color:"var(--cream-border)"}}>—</div>
                  </div>
                ))}
              </div>
              {params.depDate && (
                <div style={{background:"var(--pine-pale)",borderRadius:7,padding:"6px 9px",marginBottom:8,fontSize:"0.7rem",color:"var(--pine)",fontWeight:600}}>
                  📅 {fmt(params.depDate)} → {fmt(params.retDate)} · {nights}n
                </div>
              )}
              <a href={mountain.openSnowLink} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}

            <div style={{background:"var(--cream)",borderRadius:12,padding:"0.9rem"}}>

              <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:8}}>
                {mountain.lodgingTiers?.map(t=>(
                  <a key={t.tier}
                    href={getHotelURL(t, params.depDate, params.retDate)}
                    target="_blank" rel="noopener noreferrer"
                    onClick={e=>e.stopPropagation()}
                    className="lodging-tier">
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:1}}>
                      <span style={{fontSize:"0.68rem",fontWeight:700,color:"var(--text)"}}>{t.tier==="budget"?"Budget":t.tier==="luxury"?"Luxury":"Mid"}</span>
                      <span style={{fontSize:"0.72rem",fontWeight:800,color:"var(--pine-light)"}}>{t.pricePerNight===0?"Free":`~$${t.pricePerNight}/n`}</span>
                    </div>
                    
                    {params.depDate && t.pricePerNight > 0 && (
                      <div style={{fontSize:"0.64rem",color:"var(--pine)",marginTop:2,fontWeight:600}}>

                ))}
              </div>
              <div style={{display:"flex",gap:6}}>
                <a href={mountain.resortHomepage || mountain.resortLink} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}

                  🏔 Visit Resort
                </a>
                <a href={mountain.resortLink} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
                  style={{display:"inline-flex",alignItems:"center",gap:5,textDecoration:"none",background:"var(--cream-dark)",color:"var(--text)",border:"1px solid var(--border)",borderRadius:7,padding:"6px 10px",fontSize:"0.68rem",fontWeight:700}}>

// ─── BEST OF STRIPS ───────────────────────────────────────────────────────────
function BestOfStrips() {
  const [active, setActive] = useState(null);
  const [forecasts, setForecasts] = useState({});
  const cfg = BEST_OF.find(b => b.id === active);

  // Fetch live forecast data when Powder strip is opened
  useEffect(() => {
    if (active !== "powder") return;
    if (Object.keys(forecasts).length > 0) return; // already loaded
    const ids = MOUNTAINS.map(m => m.id);
    Promise.all(ids.map(id =>
      fetch(`https://api.opensnow.com/v1/locations/${id}/forecasts/daily?api_key=summitsync_demo`)
        .then(r => r.ok ? r.json() : null)
        .catch(() => null)
        .then(data => ({ id, data }))
    )).then(results => {
      const out = {};
      results.forEach(({ id, data }) => {
        if (data?.forecasts) {
          const total = data.forecasts.slice(0, 5).reduce((s, d) => s + (d.snow_in || 0), 0);
          out[id] = total;
        }
      });
      if (Object.keys(out).length > 0) setForecasts(out);
    });
  }, [active]);

  // Sort mountains by live forecast inches (fallback to snowScore)
  const powderRanked = useMemo(() => {
    return [...MOUNTAINS]
      .map(m => ({
        ...m,
        liveInches: forecasts[m.id] ?? null,
        sortVal: forecasts[m.id] != null ? forecasts[m.id] : (m.snowScore / 10),
      }))
      .sort((a, b) => b.sortVal - a.sortVal)
      .slice(0, 7);
  }, [forecasts]);

  function handle(id) { setActive(active === id ? null : id); }

  // Value cost row renderer
  function ValueRow({ v, i }) {
    const m = MOUNTAINS.find(m => m.name === v.name);
    const nightsEst = 2;
    const totalEst = (v.liftDay * nightsEst) + (v.lodgeNight * nightsEst);
    return (
      <div style={{
        display:"flex", alignItems:"flex-start", gap:12,
        padding:"10px 0in,
        borderBottom: i < VALUE_RESORTS.length - 1 ? "1px solid var(--border)" : "none"
      }}>
        <div style={{width:24,height:24,borderRadius:"50%",background:"var(--cream-dark)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.7rem",fontWeight:800,color:"var(--text-light)",flexShrink:0,marginTop:2}}>{i+1}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:3}}>
            <span style={{fontSize:"0.88rem",fontWeight:700,color:"var(--text)"}}>{v.name}</span>
            {m?.skiPass && <PassBadge pass={m.skiPass}/>}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"6px 14px",fontSize:"0.72rem",color:"var(--text-mid)",marginBottom:4}}>
            <span>🎟 <strong>${v.liftDay}/day</strong></span>
            <span>🛏 <strong>~${v.lodgeNight}/night</strong></span>
            <span>🚗 {v.transport}</span>
          </div>
          <div style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:"0.67rem",fontWeight:700,background:"#f0f7f2in,color:"var(--pine-light)",border:"1px solid #c8e6d0in,borderRadius:6,padding:"2px 8px"}}>
            {v.passNote}
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:"0.65rem",color:"var(--text-light)",marginBottom:1}}>Est. 2-day trip</div>
          <div style={{fontSize:"0.95rem",fontWeight:800,color:"var(--bark)"}}>${totalEst.toLocaleString()}</div>
          <div style={{fontSize:"0.6rem",color:"var(--text-light)"}}>lift + lodging only</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{maxWidth:900, margin:"0 auto", padding:"0 2rem 2.5rem"}}>
      <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"1.3rem",color:"var(--bark)",marginBottom:"1rem"}}>Browse by Category</h2>

      
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:"1rem"}}>
        {BEST_OF.map(b => (
          <button key={b.id} onClick={()=>handle(b.id)}
            style={{
              display:"flex",alignItems:"center",gap:5,
              background: active===b.id ? "var(--bark)" : "var(--snow)",
              color: active===b.id ? "var(--cream)" : "var(--text)",
              border: `1.5px solid ${active===b.id ? "var(--bark)" : "var(--border)"}`,
              borderRadius:99, padding:"7px 14px",
              fontSize:"0.8rem", fontWeight:600, cursor:"pointer",
              transition:"all 0.15s"
            }}>
            {b.icon} {b.label}
          </button>
        ))}
      </div>

      
      {cfg && (
        <div style={{background:"var(--snow)",border:"1.5px solid var(--border)",borderRadius:14,padding:"1.25rem",animation:"fadeUp 0.2s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1rem"}}>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.1rem",marginBottom:2}}>{cfg.icon} {cfg.label}</div>
              <div style={{fontSize:"0.75rem",color:"var(--text-light)"}}>{cfg.desc}</div>
            </div>
            <button onClick={()=>setActive(null)} style={{background:"none",border:"none",fontSize:"1rem",cursor:"pointer",color:"var(--text-light)",padding:4}}>✕</button>
          </div>

          
          {cfg.id === "powder" && (
            <div style={{display:"flex",flexDirection:"column",gap:0}}>
              {Object.keys(forecasts).length === 0 && (
                <div style={{fontSize:"0.75rem",color:"var(--text-light)",marginBottom:10,fontStyle:"italic"}}>
                  Loading live forecasts... (ranked by historical snowfall until data arrives)
                </div>
              )}
              {powderRanked.map((m, i) => (
                <div key={m.id} style={{display:"flex",alignItems:"center",gap:12,padding:"9px 0in,borderBottom:i<powderRanked.length-1?"1px solid var(--border)":"none"}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:"var(--cream-dark)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.7rem",fontWeight:800,color:"var(--text-light)",flexShrink:0}}>{i+1}</div>
                  <div style={{flex:1}}>

// ─── MAP SECTION ──────────────────────────────────────────────────────────────
function MapSection({ results, params }) {
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);
  const markersRef = useRef({});
  const resultIds = new Set((results||[]).map(r=>r.id));

  function buildPopupHtml(m, isResult, rank, cost, withinBudget) {
    return `<div style="font-family:'Source Sans 3',sans-serif;">
      <div style="background:#2c1f0e;padding:14px 16px 12px;">
        ${isResult?`<div style="font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:${rank===0?"#f5c842in:"#7eb89a"};margin-bottom:4px;">${rank===0?"⭐ Top Pick":`#${rank+1} Match`}</div>`:""}
        <div style="font-family:'Playfair Display',serif;font-size:15px;color:#faf7f2;line-height:1.2;">${m.name}</div>
        <div style="font-size:11px;color:#9e8a72;margin-top:2px;">${m.state} · <em>${m.nickname}</em></div>
      </div>
      <div style="padding:12px 14px 14px;background:#faf7f2;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;">
          ${[["Vertical",`${m.verticalDrop.toLocaleString()} ft`],["Avg Snow",`${m.averageSnowfall}"`],["Lift Ticket",`$${m.liftTicket}/day`],["Crowds",m.crowdScore<30?"Low ✓":m.crowdScore<60?"Moderate":"High"]].map(([l,v])=>`
          <div style="background:#f0ebe0;border-radius:7px;padding:7px 9px;">
            <div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#9e8a72;">${l}</div>
            <div style="font-size:13px;font-weight:700;color:#2c1f0e;">${v}</div>
          </div>`).join("")}
        </div>
        ${cost?`<div style="background:${withinBudget?"#e8f2ec":"#fdf0eb"};border-radius:7px;padding:7px 10px;margin-bottom:10px;display:flex;justify-content:space-between;">
          <span style="font-size:11px;font-weight:700;color:${withinBudget?"#2d6b42in:"#b5441a"};">${withinBudget?"✓ In budget":"⚠ Over budget"}</span>
          <span style="font-size:13px;font-weight:800;color:#2c1f0e;">$${cost.toLocaleString()}</span>
        </div>`:""}
        <div style="display:flex;gap:6px;">
          <a href="${m.openSnowLink}" target="_blank" style="flex:1;display:flex;align-items:center;justify-content:center;gap:4px;background:#2a3d4f;color:#faf7f2;border-radius:7px;padding:8px;font-size:11px;font-weight:700;text-decoration:none;">❄️ Forecast</a>
          <a href="${m.resortHomepage || m.resortLink}" target="_blank" style="flex:1;display:flex;align-items:center;justify-content:center;gap:4px;background:#2c1f0e;color:#faf7f2;border-radius:7px;padding:8px;font-size:11px;font-weight:700;text-decoration:none;">🏔 Visit Resort</a>
        </div>
      </div>
    </div>`;
  }

  useEffect(() => {
    if (mapInstanceRef.current) return;
    const map = L.map(mapRef.current, { center:[43.5,-112], zoom:5, zoomControl:true, scrollWheelZoom:false });
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
      attribution:"© OpenStreetMap © CartoDB", subdomains:"abcd", maxZoom:14
    }).addTo(map);
    mapInstanceRef.current = map;

    MOUNTAINS.forEach(m => {
      const isResult = resultIds.has(m.id);
      const rank = results.findIndex(r=>r.id===m.id);
      const color = REGION_COLORS[m.region]||"#6b5a45in;
      const cost = params ? calcTripCost(m, nightsBetween(params.depDate,params.retDate)||params.nights, params.groupSize, params.origin) : null;
      const withinBudget = cost && params ? cost <= params.budget*1.15 : null;

      const size = isResult ? 32 : 24;
      const label = rank >= 0 ? `#${rank+1}` : "·";
      const iconHtml = `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${isResult?"#c8901a":color};color:#fff;display:flex;align-items:center;justify-content:center;font-size:${isResult?11:9}px;font-weight:800;font-family:Source Sans 3,sans-serif;border:2.5px solid #fff;box-shadow:${isResult?"0 0 0 4px rgba(200,144,26,0.4),0 2px 12px rgba(0,0,0,0.25)":"0 2px 8px rgba(0,0,0,0.2)"};cursor:pointer;">${label}</div>`;
      const icon = L.divIcon({ html:iconHtml, className:"", iconSize:[size,size], iconAnchor:[size/2,size/2], popupAnchor:[0,-size/2] });
      const marker = L.marker([m.lat,m.lon],{icon}).addTo(map);
      marker.bindPopup(buildPopupHtml(m,isResult,rank,cost,withinBudget), {maxWidth:270,minWidth:270});
      markersRef.current[m.id] = marker;
    });
  }, []);

  useEffect(() => {
    if (!mapInstanceRef.current) return;
    const nights = nightsBetween(params?.depDate, params?.retDate) || params?.nights || 4;
    MOUNTAINS.forEach(m => {
      const marker = markersRef.current[m.id];
      if (!marker) return;
      const isResult = resultIds.has(m.id);
      const rank = results.findIndex(r=>r.id===m.id);
      const color = REGION_COLORS[m.region]||"#6b5a45in;
      const cost = params ? calcTripCost(m, nights, params.groupSize, params.origin) : null;
      const withinBudget = cost && params ? cost <= params.budget*1.15 : null;
      const size = isResult ? 32 : 24;
      const label = rank >= 0 ? `#${rank+1}` : "·";
      const iconHtml = `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${isResult?"#c8901a":color};color:#fff;display:flex;align-items:center;justify-content:center;font-size:${isResult?11:9}px;font-weight:800;font-family:Source Sans 3,sans-serif;border:2.5px solid #fff;box-shadow:${isResult?"0 0 0 4px rgba(200,144,26,0.4),0 2px 12px rgba(0,0,0,0.25)":"0 2px 8px rgba(0,0,0,0.2)"};cursor:pointer;">${label}</div>`;
      const icon = L.divIcon({ html:iconHtml, className:"", iconSize:[size,size], iconAnchor:[size/2,size/2], popupAnchor:[0,-size/2] });
      marker.setIcon(icon);
      marker.setPopupContent(buildPopupHtml(m,isResult,rank,cost,withinBudget));
    });
  }, [results, params]);

  return (
    <div style={{padding:"0 2rem 5rem",maxWidth:1100,margin:"0 auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"1.25rem",flexWrap:"wrap",gap:8}}>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"1.5rem",color:"var(--bark)"}}>All 60 Resorts</h2>
        <div style={{display:"flex",gap:"1rem",alignItems:"center",flexWrap:"wrap"}}>
          {[["🟡","Search match"],["🟢","Rockies"],["🔵","PNW"],["🟤","Sierra"]].map(([dot,label])=>(
            <span key={label} style={{fontSize:"0.72rem",color:"var(--text-light)",display:"flex",alignItems:"center",gap:4}}>{dot} {label}</span>
          ))}
        </div>
      </div>
      <div ref={mapRef} style={{height:520,borderRadius:16,overflow:"hidden",border:"1px solid var(--border)",boxShadow:"0 4px 24px rgba(44,31,14,0.08)"}}/>
      <p style={{marginTop:8,fontSize:"0.68rem",color:"var(--text-light)",textAlign:"right"}}>Use +/− to zoom · scroll zoom disabled · click any pin for resort details</p>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  // Default dates: next Friday + Sunday (quick weekend trip feel)
  function getDefaultDates() {
    const today = new Date();
    const daysUntilFri = (5 - today.getDay() + 7) % 7 || 7;
    const dep = new Date(today); dep.setDate(today.getDate() + daysUntilFri);
    const ret = new Date(dep); ret.setDate(dep.getDate() + 3);
    return [dep.toISOString().split("T")[0], ret.toISOString().split("T")[0]];
  }
  const [defaultDep, defaultRet] = getDefaultDates();

  const [params, setParams] = useState({
    budget:2500, groupSize:2, origin:"denver",
    travel:"either", style:"all-mountain", skill:"intermediate",
    depDate:defaultDep, retDate:defaultRet
  });
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [aiRec, setAiRec] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [expandedId, setExpandedId] = useState(null);
  const [hasSearched, setHasSearched] = useState(false);
  const [showCount, setShowCount] = useState(8);
  const [liveData, setLiveData] = useState({});
  const [showAbout, setShowAbout] = useState(false);
  const resultsRef = useRef(null);
  const set = (k,v) => setParams(p=>({...p,[k]:v}));

  const nights = nightsBetween(params.depDate, params.retDate);

  async function runSearch() {
    setLoading(true); setHasSearched(false); setAiRec(""); setExpandedId(null); setShowCount(8);
    const [forecasts] = await Promise.all([
      fetchForecasts(MOUNTAINS),
      new Promise(r=>setTimeout(r,800))
    ]);
    setLiveData(forecasts);
    const scored = MOUNTAINS
      .map(m=>({...m, score:scoreResort(m,params,forecasts), estimatedCost:calcTripCost(m,nights,params.groupSize,params.origin)}))
      .filter(m=>m.score>0)
      .sort((a,b)=>b.score-a.score);
    setResults(scored); setLoading(false); setHasSearched(true);
    setTimeout(()=>resultsRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),120);
    if (scored.length>0) {
      setAiLoading(true);
      try { setAiRec(await getAIRec(scored[0],params,scored,forecasts)); }
      catch(e) { setAiRec("Couldn't load recommendation — check your connection and try again."); }
      setAiLoading(false);
    }
  }

  return (
    <div style={{minHeight:"100vh",position:"relative",zIndex:1}}>
      {showAbout && <WhyModal onClose={()=>setShowAbout(false)}/>}

      
      <nav className="nav">
        <div style={{maxWidth:1100,margin:"0 auto",padding:"0 2rem",height:58,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,background:"var(--bark)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--cream)",fontFamily:"'Playfair Display',serif",fontSize:"1.1rem",fontStyle:"italic",fontWeight:700}}>S</div>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:"1.25rem",color:"var(--bark)",letterSpacing:"-0.01em"}}>SummitSync</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"1.25rem"}}>
            <span style={{fontSize:"0.72rem",color:"var(--text-light)",display:"flex",alignItems:"center",gap:5}}>
              <span style={{width:6,height:6,background:"var(--pine-light)",borderRadius:"50%",animation:"pulse 2.5s infinite",display:"inline-block"}}/>
              Live forecasts
            </span>
            <button onClick={()=>setShowAbout(true)} className="btn-ghost" style={{padding:"6px 15px",fontSize:"0.8rem",fontWeight:600}}>
              Why SummitSync
            </button>
          </div>
        </div>
      </nav>

      
      <div className="hero-bg" style={{paddingTop:"4rem",paddingBottom:"3rem",textAlign:"center"}}>
        <div style={{maxWidth:700,margin:"0 auto",padding:"0 2rem"}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:7,fontSize:"0.68rem",fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--pine-light)",background:"var(--pine-pale)",border:"1px solid #b8d9c5in,borderRadius:99,padding:"5px 14px",marginBottom:"1.5rem"}}>
            60 resorts · Live snow · Flights & hotels in one place
          </div>

            Stop planning.<br/><em style={{color:"var(--pine-light)"}}>Start skiing.</em>

            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{fontSize:"0.7rem",color:"var(--text-light)"}}>Live snow · click to expand</span>
              <span style={{fontSize:"0.68rem",color:"var(--border)"}}>|</span>
              {[["🔵","Epic"],["🟦","Ikon"],["🟢","Mtn Collective"],["🟠","Indy"],["⚪","Independent"]].map(([dot,l])=>(
                <span key={l} style={{fontSize:"0.67rem",color:"var(--text-light)",whiteSpace:"nowrap"}}>{dot} {l}</span>
              ))}
            </div>
          </div>

          {results.slice(0,showCount).map((m,i)=>(
            <ResultCard key={m.id} mountain={m} rank={i+1} params={params}
              isExpanded={expandedId===m.id}
              onToggle={()=>setExpandedId(expandedId===m.id?null:m.id)}
              liveData={liveData}/>
          ))}

          {results.length > showCount && (
            <button onClick={()=>setShowCount(c=>c+8)} className="btn-ghost"
              style={{width:"100%",padding:"13px",fontSize:"0.85rem",fontWeight:600,marginBottom:"1rem",background:"var(--snow)"}}>
              Show {Math.min(8, results.length-showCount)} more ({results.length-showCount} remaining)
            </button>
          )}

          
          <div style={{marginTop:"2.5rem",marginBottom:"3rem"}}>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"1.4rem",color:"var(--bark)",marginBottom:"1.25rem"}}>Weather Snapshot — Top 3</h2>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0.875rem"}}>
              {results.slice(0,3).map(m=>{
                const live=liveData?.[m.id];
                const fc=live?.forecast||[];
                const total=fc.reduce((s,d)=>s+(d.snow||0),0);
                const trend=total>18?{label:"↑ Active storm",bg:"var(--pine-pale)",color:"var(--pine-light)"}:total>6?{label:"→ Mixed",bg:"var(--gold-pale)",color:"var(--gold)"}:{label:"↓ Dry stretch",bg:"var(--rust-pale)",color:"var(--rust)"};
                return (
                  <div key={m.id} style={{background:"var(--snow)",border:"1px solid var(--border)",borderRadius:14,padding:"1.25rem"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                      <div style={{fontSize:"0.7rem",fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",color:"var(--text-light)"}}>{m.name}</div>
                      {live&&<span style={{fontSize:"0.58rem",fontWeight:800,color:"var(--slate)",background:"var(--slate-pale)",borderRadius:99,padding:"2px 7px",letterSpacing:"0.06em"}}>LIVE</span>}
                    </div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.9rem",lineHeight:1,color:"var(--bark)"}}>{total}"</div>
                    <div style={{fontSize:"0.72rem",color:"var(--text-light)",marginTop:2,marginBottom:8}}>5-day forecast snowfall</div>
                    <div style={{display:"inline-flex",fontSize:"0.7rem",fontWeight:700,background:trend.bg,color:trend.color,borderRadius:99,padding:"3px 10px",marginBottom:8}}>{trend.label}</div>
                    <div style={{fontSize:"0.72rem",color:"var(--text-mid)",marginBottom:8}}>{m.averageSnowfall}" season average</div>
                    <a href={m.openSnowLink} target="_blank" rel="noopener noreferrer"
                      style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:"0.7rem",fontWeight:700,color:"var(--slate)",textDecoration:"none"}}>
                      ❄️ Full forecast on OpenSnow →
                    </a>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {!hasSearched && !loading && (
        <div style={{textAlign:"center",padding:"5rem 2rem 3rem",color:"var(--text-light)",fontSize:"0.9rem"}}>
          <div style={{fontSize:"2.5rem",marginBottom:"0.75rem",animation:"float 3s ease-in-out infinite"}}>⛷</div>
          Set your dates and hit <strong style={{color:"var(--text)"}}>Find My Mountain</strong>
        </div>
      )}

      
      <BestOfStrips/>
      <MapSection results={results} params={params}/>

      
      <footer style={{borderTop:"1px solid var(--border)",padding:"2rem",textAlign:"center",background:"var(--cream-dark)"}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1rem",color:"var(--bark)",marginBottom:6}}>SummitSync</div>
        <p style={{fontSize:"0.72rem",color:"var(--text-light)",lineHeight:1.8}}>
          60 western resorts · Live forecasts via Open-Meteo · Flights via Google Flights · Hotels via Booking.com & Expedia<br/>
          Built by a skier, for skiers. Not affiliated with any resort or booking platform.
        </p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
