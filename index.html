function calcTripCost(m, nights, groupSize, origin) {
  const lodging = m.avgLodgingPerNight * nights;
  const tickets = m.liftTicket * nights * groupSize;
  const dist = origin === "slc" ? m.distanceSLC : m.distanceDenver;
  let travel = 0;
  if (m.travelMode === "drive" || (m.travelMode === "either" && dist < 200)) {
    travel = Math.round(dist * 0.18 * 2);
  } else {
    travel = groupSize * 260;
  }
  return lodging + tickets + travel;
}

function scoreResult(m, params) {
  const { budget, nights, groupSize, origin, style, skill, travel } = params;
  const cost = calcTripCost(m, nights, groupSize, origin);
  const budgetFit = cost <= budget ? 1 : cost <= budget * 1.2 ? 0.6 : 0.2;
  if (travel === "drive" && m.travelMode === "fly") return -1;
  if (travel === "fly" && m.travelMode === "drive" && (origin === "slc" ? m.distanceSLC : m.distanceDenver) < 150) return -1;
  const snow = m.snowScore * 0.35;
  const value = m.valueScore * budgetFit * 0.25;
  const crowd = (100 - m.crowdScore) * 0.18;
  const access = m.accessScore * 0.1;
  const styleBonus = m.tags.includes(style) ? 9 : 0;
  const skillBonus = m.tags.includes(skill) ? 5 : 0;
  return Math.round(snow + value + crowd + access + styleBonus + skillBonus);
}

async function getAIRecommendation(topMountain, params, allResults) {
  const top3Names = allResults.slice(0, 3).map(m => m.name).join(", ");
  const totalSnow = topMountain.weeklyForecast.reduce((s, d) => s + d.snow, 0);
  const cost = calcTripCost(topMountain, params.nights, params.groupSize, params.origin);
  const originLabel = params.origin === "slc" ? "Salt Lake City" : params.origin === "denver" ? "Denver" : params.origin;

  const prompt = `You are a ski-obsessed local who's skied every resort in the western US. You talk like a knowledgeable friend, not a customer service rep. No fluff, no corporate language, no phrases like "I'd be happy to" or "This is a great choice." Just straight talk.

Someone is planning a ski trip:
- Budget: $${params.budget} total for ${params.groupSize} skier(s), ${params.nights} nights
- How they're getting there: ${params.travel}
- What they're after: ${params.style} skiing, ${params.skill} level
- Leaving from: ${originLabel}

You ran the numbers. Top pick is ${topMountain.name}, ${topMountain.state}.
- Trip cost estimate: $${cost.toLocaleString()}
- Snow on the ground right now: ${topMountain.currentBase} inches
- What's coming in the next 5 days: ${totalSnow} inches
- Crowd situation: ${topMountain.crowdScore}/100 (lower = more empty)
- ${topMountain.description}

Other decent options: ${top3Names}

Write 3 sentences MAX explaining why ${topMountain.name} makes sense for this specific person. Sound like a ski buddy texting them a recommendation, not a travel agent writing a brochure. Use real specifics — snow numbers, cost, why it fits their style. End with one blunt honest tip. Under 75 words. No bullet points. No hedging. No "it's worth noting that."`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  const data = await response.json();
  return data.content?.[0]?.text || "";
}

              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {mountain.lodgingTiers.map(t=>(
                  <a key={t.tier} href={t.link} target="_blank" rel="noopener noreferrer"
                    onClick={e=>e.stopPropagation()}
                    style={{display:"block",textDecoration:"none",background:"#fff",border:"1px solid #e8e4de",borderRadius:8,padding:"8px 10px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                      <span style={{fontSize:"0.72rem",fontWeight:700,color:"#0d0f0f"}}>{t.label}</span>
                      <span style={{fontSize:"0.78rem",fontWeight:700,color:"#1a6b7c"}}>{t.pricePerNight===0?"Free":`$${t.pricePerNight}/night`}</span>
                    </div>
                    <div style={{fontSize:"0.72rem",fontWeight:600,color:"#4a4540"}}>{t.name}</div>
                    <div style={{fontSize:"0.68rem",color:"#8a8480",marginTop:1}}>{t.note}</div>
                  </a>
                ))}
              </div>
            </div>
            <div style={{background:"#f8f7f4",borderRadius:10,padding:"1rem"}}>
              <div style={{fontSize:"0.68rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"#8a8480",marginBottom:10}}>Local Intel</div>
              <div style={{fontSize:"0.8rem",color:"#4a4540",lineHeight:1.7}}>
                <div><strong>↑</strong> {mountain.pros}</div>
                <div style={{marginTop:6}}><strong>↓</strong> {mountain.cons}</div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [params, setParams] = useState({budget:2000,nights:4,groupSize:2,origin:"denver",travel:"either",style:"all-mountain",skill:"intermediate"});
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [aiRec, setAiRec] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [expandedId, setExpandedId] = useState(null);
  const [hasSearched, setHasSearched] = useState(false);
  const resultsRef = useRef(null);
  const set = (k,v) => setParams(p=>({...p,[k]:v}));

  async function runSearch() {
    setLoading(true); setHasSearched(false); setAiRec(""); setExpandedId(null);
    await new Promise(r=>setTimeout(r,800));
    const scored = MOUNTAINS
      .map(m=>({...m,score:scoreResult(m,params),estimatedCost:calcTripCost(m,params.nights,params.groupSize,params.origin)}))
      .filter(m=>m.score>0).sort((a,b)=>b.score-a.score);
    setResults(scored); setLoading(false); setHasSearched(true);
    setTimeout(()=>resultsRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),100);
    if (scored.length>0) {
      setAiLoading(true);
      try { const rec = await getAIRecommendation(scored[0],params,scored); setAiRec(rec); }
      catch(e) { setAiRec("Couldn't load recommendation — try again."); }
      setAiLoading(false);
    }
  }

  const inp = {height:44,border:"1.5px solid #e8e4de",borderRadius:8,padding:"0 12px",fontFamily:"'DM Sans',sans-serif",fontSize:"0.9rem",color:"#0d0f0f",background:"#f5f3ef",outline:"none",width:"100%"};
  const lbl = {fontSize:"0.68rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"#8a8480",marginBottom:5,display:"block"};

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"#f8f7f4",minHeight:"100vh",color:"#0d0f0f"}}>
      {/* NAV */}
      <nav style={{position:"sticky",top:0,zIndex:100,background:"rgba(248,247,244,0.92)",backdropFilter:"blur(14px)",borderBottom:"1px solid #e8e4de",padding:"0 2rem",height:58,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,background:"#0d0f0f",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontFamily:"'DM Serif Display',serif",fontSize:"1rem"}}>S</div>
          <span style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.2rem"}}>SummitSync</span>
        </div>
        <div style={{display:"flex",gap:6}}>
          {["AI-Powered","8 Resorts","Live Scoring"].map(t=>(
            <span key={t} style={{fontSize:"0.65rem",fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",color:"#8a8480",background:"#f0ede8",border:"1px solid #e8e4de",borderRadius:99,padding:"3px 10px"}}>{t}</span>
          ))}
        </div>
      </nav>

      {/* HERO */}
      <div style={{maxWidth:760,margin:"0 auto",padding:"4.5rem 2rem 2.5rem",textAlign:"center"}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:7,fontSize:"0.68rem",fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",color:"#1a6b7c",background:"#eef6f9",border:"1px solid #c5dfe8",borderRadius:99,padding:"5px 14px",marginBottom:"1.5rem"}}>
          <span style={{width:6,height:6,background:"#2a8fa5",borderRadius:"50%",animation:"pulse 2s infinite",display:"inline-block"}}/>
          Ski Trip Intelligence · Powered by AI
        </div>
        <h1 style={{fontFamily:"'DM Serif Display',serif",fontSize:"clamp(2rem,5vw,3.2rem)",lineHeight:1.1,letterSpacing:"-0.02em",margin:"0 0 1rem"}}>
          Find the <em style={{color:"#1a6b7c"}}>right mountain</em><br/>for your trip
        </h1>
        <p style={{fontSize:"1rem",color:"#6b6560",lineHeight:1.7,maxWidth:500,margin:"0 auto"}}>
          Tell us your budget, dates, and style. Our AI compares 8 western resorts on snow quality, cost, crowds, and access — then explains exactly why one is right for you.
        </p>
      </div>

      {/* SEARCH */}
      <div style={{maxWidth:860,margin:"0 auto",padding:"0 2rem"}}>
        <div style={{background:"#fff",border:"1px solid #e8e4de",borderRadius:16,padding:"2rem",boxShadow:"0 8px 40px rgba(13,15,15,0.08)"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"1rem",marginBottom:"1rem"}}>
            <div><label style={lbl}>Budget (USD)</label><input type="number" value={params.budget} onChange={e=>set("budget",+e.target.value)} min={500} step={100} style={inp}/></div>
            <div><label style={lbl}>Nights</label><input type="number" value={params.nights} onChange={e=>set("nights",+e.target.value)} min={1} max={14} style={inp}/></div>
            <div><label style={lbl}>Group Size</label><input type="number" value={params.groupSize} onChange={e=>set("groupSize",+e.target.value)} min={1} max={20} style={inp}/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"1rem",marginBottom:"1.25rem"}}>
            <div><label style={lbl}>From</label>
              <select value={params.origin} onChange={e=>set("origin",e.target.value)} style={inp}>
                <option value="denver">Denver, CO</option><option value="slc">Salt Lake City, UT</option>
                <option value="la">Los Angeles, CA</option><option value="seattle">Seattle, WA</option><option value="nyc">New York, NY</option>
              </select>
            </div>
            <div><label style={lbl}>Travel Mode</label>
              <select value={params.travel} onChange={e=>set("travel",e.target.value)} style={inp}>
                <option value="either">Either</option><option value="drive">Drive</option><option value="fly">Fly</option>
              </select>
            </div>
            <div><label style={lbl}>Ski Style</label>
              <select value={params.style} onChange={e=>set("style",e.target.value)} style={inp}>
                <option value="all-mountain">All-Mountain</option><option value="powder">Powder Chase</option>
                <option value="park">Park / Freestyle</option><option value="family">Family-Friendly</option><option value="value">Best Value</option>
              </select>
            </div>
            <div><label style={lbl}>Skill Level</label>
              <select value={params.skill} onChange={e=>set("skill",e.target.value)} style={inp}>
                <option value="intermediate">Intermediate</option><option value="beginner">Beginner</option><option value="advanced">Advanced</option>
              </select>
            </div>
          </div>
          <button onClick={runSearch} disabled={loading} style={{width:"100%",height:52,background:loading?"#6b6560":"#0d0f0f",color:"#fff",border:"none",borderRadius:10,fontFamily:"'DM Sans',sans-serif",fontSize:"0.95rem",fontWeight:700,letterSpacing:"0.03em",cursor:loading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"background 0.15s"}}>
            {loading?<><div style={{width:18,height:18,border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>Scoring mountains…</>:"Search Mountains →"}
          </button>
        </div>
      </div>

      {/* RESULTS */}
      {hasSearched && (
        <div ref={resultsRef} style={{maxWidth:860,margin:"3rem auto 0",padding:"0 2rem",animation:"fadeUp 0.4s ease"}}>
          <div style={{background:"#0d0f0f",borderRadius:14,padding:"1.5rem",marginBottom:"2rem",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,right:0,width:200,height:"100%",background:"linear-gradient(90deg,transparent,rgba(26,107,124,0.15))",pointerEvents:"none"}}/>
            <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
              <div style={{width:36,height:36,background:"#1a6b7c",borderRadius:8,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem"}}>✦</div>
              <div style={{flex:1}}>
                <div style={{fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"#2a8fa5",marginBottom:6}}>SummitSync Pick</div>
                {aiLoading?(
                  <div style={{height:16,borderRadius:4,marginBottom:6,background:"linear-gradient(90deg,#2a2a2a 25%,#3a3a3a 50%,#2a2a2a 75%)",backgroundSize:"400px 100%",animation:"shimmer 1.2s infinite"}}/>
                ):(
                  <p style={{color:"#f0ede8",fontSize:"0.92rem",lineHeight:1.7,margin:0}}>{aiRec}</p>
                )}
              </div>
            </div>
          </div>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"1.25rem"}}>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.5rem"}}>{results.length} Matches</div>
            <div style={{fontSize:"0.75rem",color:"#a09b92"}}>Ranked by SummitScore · click to expand</div>
          </div>

          {results.map((m,i)=>(
            <ResultCard key={m.id} mountain={m} rank={i+1} params={params}
              isExpanded={expandedId===m.id} onToggle={()=>setExpandedId(expandedId===m.id?null:m.id)}/>
          ))}

          <div style={{marginTop:"2.5rem",marginBottom:"4rem"}}>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.5rem",marginBottom:"1.25rem"}}>Weather Snapshot</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0.875rem"}}>
              {results.slice(0,3).map(m=>{
                const total = m.weeklyForecast.reduce((s,d)=>s+d.snow,0);
                const trend = total>20?{label:"↑ Active pattern",bg:"#e8f5ee",color:"#1e7a4a"}:total>6?{label:"→ Mixed outlook",bg:"#fef9e7",color:"#b8860b"}:{label:"↓ Dry stretch",bg:"#fdecea",color:"#c0392b"};
                return (
                  <div key={m.id} style={{background:"#fff",border:"1px solid #e8e4de",borderRadius:12,padding:"1.25rem"}}>
                    <div style={{fontSize:"0.68rem",fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#8a8480",marginBottom:6}}>{m.name}</div>
                    <div style={{fontFamily:"'DM Serif Display',serif",fontSize:"2rem",lineHeight:1}}>{m.currentBase}"</div>
                    <div style={{fontSize:"0.75rem",color:"#a09b92",marginTop:2,marginBottom:8}}>current base depth</div>
                    <div style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:"0.72rem",fontWeight:700,background:trend.bg,color:trend.color,borderRadius:99,padding:"3px 10px"}}>{trend.label}</div>
                    <div style={{fontSize:"0.75rem",color:"#6b6560",marginTop:8}}>{total}" forecast · {m.averageSnowfall}" season avg</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {!hasSearched&&!loading&&(
        <div style={{textAlign:"center",padding:"4rem 2rem",color:"#a09b92",fontSize:"0.9rem"}}>
          Set your preferences above and hit Search Mountains
        </div>
      )}

      <footer style={{borderTop:"1px solid #e8e4de",padding:"1.5rem 2rem",textAlign:"center",fontSize:"0.72rem",color:"#a09b92"}}>
        © 2025 SummitSync · AI powered by Claude · Not affiliated with any resort or booking platform
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
